spring.config.import=optional:file:./config/local.properties,optional:file:./my-spring-war/config/local.properties,optional:file:./local.properties

myapp.dataDir=${MYAPP_DATA_DIR:${myapp.local.crmSourceFilesDirectory:data/crm/source}}
myapp.google.credentialsPath=${GOOGLE_APPLICATION_CREDENTIALS:${myapp.local.googleCredentialsPath:}}
myapp.google.sourceLanguage=${GOOGLE_TRANSLATE_SOURCE_LANGUAGE:${myapp.local.googleSourceLanguage:}}
myapp.google.targetLanguage=${GOOGLE_TRANSLATE_TARGET_LANGUAGE:${myapp.local.googleTargetLanguage:}}
myapp.google.projectId=${GOOGLE_TRANSLATE_PROJECT_ID:${myapp.local.googleProjectId:}}
myapp.google.location=${GOOGLE_TRANSLATE_LOCATION:${myapp.local.googleLocation:global}}
myapp.google.model=${GOOGLE_TRANSLATE_MODEL:${myapp.local.googleModel:general/translation-llm}}
myapp.google.glossaryEnabled=${GOOGLE_TRANSLATE_GLOSSARY_ENABLED:${myapp.local.googleGlossaryEnabled:false}}
myapp.google.glossaryId=${GOOGLE_TRANSLATE_GLOSSARY_ID:${myapp.local.googleGlossaryId:}}
myapp.google.glossaryFile=${GOOGLE_TRANSLATE_GLOSSARY_FILE:${myapp.local.googleGlossaryFile:}}
myapp.google.glossaryBucket=${GOOGLE_TRANSLATE_GLOSSARY_BUCKET:${myapp.local.googleGlossaryBucket:}}
myapp.google.glossaryObjectPrefix=${GOOGLE_TRANSLATE_GLOSSARY_OBJECT_PREFIX:${myapp.local.googleGlossaryObjectPrefix:}}
myapp.google.glossaryResourceTemplate=${GOOGLE_TRANSLATE_GLOSSARY_RESOURCE_TEMPLATE:${myapp.local.googleGlossaryResourceTemplate:}}
myapp.google.adaptiveDatasetFile=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_FILE:${myapp.local.googleAdaptiveDatasetFile:}}
myapp.google.adaptiveDatasetBucket=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_BUCKET:${myapp.local.googleAdaptiveDatasetBucket:}}
myapp.google.adaptiveDatasetObjectPrefix=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_OBJECT_PREFIX:${myapp.local.googleAdaptiveDatasetObjectPrefix:}}
myapp.google.adaptiveDatasetResourceTemplate=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_RESOURCE_TEMPLATE:${myapp.local.googleAdaptiveDatasetResourceTemplate:}}
myapp.google.adaptiveDatasetEnabled=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_ENABLED:${myapp.local.googleAdaptiveDatasetEnabled:true}}
myapp.google.adaptiveDatasetRoutingStrategy=${GOOGLE_TRANSLATE_ADAPTIVE_DATASET_ROUTING_STRATEGY:${myapp.local.googleAdaptiveDatasetRoutingStrategy:risky-short}}
myapp.google.batchSize=${GOOGLE_TRANSLATE_BATCH_SIZE:${myapp.local.googleBatchSize:50}}
myapp.google.supportedLanguagesDisplayLocale=${GOOGLE_TRANSLATE_SUPPORTED_LANGUAGES_LOCALE:${myapp.local.supportedLanguagesDisplayLocale:${myapp.local.googleDisplayLanguage:en}}}
myapp.ui.preferredTargetLanguage=${UI_PREFERRED_TARGET_LANGUAGE:${myapp.local.uiPreferredTargetLanguage:fr}}
myapp.referenceLanguageFile=${REFERENCE_LANGUAGE_FILE:${myapp.local.referenceLanguageFile:en}}
myapp.riskyTermsFile=${RISKY_TERMS_FILE:${myapp.local.riskyTermsFile:risky-terms.txt}}
myapp.translation.placeholderProtectionEnabled=${TRANSLATION_PLACEHOLDER_PROTECTION_ENABLED:${myapp.local.placeholderProtectionEnabled:true}}
myapp.translation.validationEnabled=${TRANSLATION_VALIDATION_ENABLED:${myapp.local.validationEnabled:true}}
translation.openai-post-processing.enabled=${TRANSLATION_OPENAI_POST_PROCESSING_ENABLED:${myapp.local.openaiPostProcessingEnabled:true}}

myapp.crm.sourceFilesDirectory=${CRM_SOURCE_FILES_DIRECTORY:${myapp.local.crmSourceFilesDirectory:data/crm/source}}
myapp.crm.glossaryDirectory=${CRM_GLOSSARY_DIRECTORY:${myapp.local.crmGlossaryDirectory:data/crm/glossary}}
myapp.crm.adaptiveDatasetDirectory=${CRM_ADAPTIVE_DATASET_DIRECTORY:${myapp.local.crmAdaptiveDatasetDirectory:data/crm/adaptive}}
myapp.crm.translatedJsonDirectory=${CRM_TRANSLATED_JSON_DIRECTORY:${myapp.local.crmTranslatedJsonDirectory:data/crm/translated}}
myapp.selfService.sourceFilesDirectory=${SELF_SERVICE_SOURCE_FILES_DIRECTORY:${myapp.local.selfServiceSourceFilesDirectory:data/self-service/source}}
myapp.selfService.glossaryDirectory=${SELF_SERVICE_GLOSSARY_DIRECTORY:${myapp.local.selfServiceGlossaryDirectory:data/self-service/glossary}}
myapp.selfService.adaptiveDatasetDirectory=${SELF_SERVICE_ADAPTIVE_DATASET_DIRECTORY:${myapp.local.selfServiceAdaptiveDatasetDirectory:data/self-service/adaptive}}
myapp.selfService.translatedJsonDirectory=${SELF_SERVICE_TRANSLATED_JSON_DIRECTORY:${myapp.local.selfServiceTranslatedJsonDirectory:data/self-service/translated}}

myapp.log.directory=${MYAPP_LOG_DIRECTORY:${myapp.local.logDirectory:logs}}

logging.file.name=${myapp.log.directory}/translation-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.charset.console=UTF-8
logging.charset.file=UTF-8

openai.enabled=${OPENAI_ENABLED:${myapp.local.openaiEnabled:true}}
openai.api-key=${OPENAI_API_KEY:${myapp.local.openaiApiKey:}}
openai.model=${OPENAI_MODEL:${myapp.local.openaiModel:gpt-5.4}}
openai.base-url=${OPENAI_BASE_URL:${myapp.local.openaiBaseUrl:https://api.openai.com/v1}}
openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:${myapp.local.openaiTimeoutSeconds:60}}
openai.max-batch-size=${OPENAI_MAX_BATCH_SIZE:${myapp.local.openaiMaxBatchSize:200}}
openai.fail-on-error=${OPENAI_FAIL_ON_ERROR:${myapp.local.openaiFailOnError:false}}
openai.max-retries=${OPENAI_MAX_RETRIES:${myapp.local.openaiMaxRetries:3}}
openai.retry-backoff-ms=${OPENAI_RETRY_BACKOFF_MS:${myapp.local.openaiRetryBackoffMs:1000}}
openai.max-concurrent-requests=${OPENAI_MAX_CONCURRENT_REQUESTS:${myapp.local.openaiMaxConcurrentRequests:4}}
openai.reasoning-effort=${OPENAI_REASONING_EFFORT:${myapp.local.openaiReasoningEffort:low}}
openai.verbosity=${OPENAI_VERBOSITY:${myapp.local.openaiVerbosity:low}}
openai.report-path=${OPENAI_REPORT_PATH:${myapp.local.openaiReportPath:reports/openai}}
